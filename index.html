<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Симулятор Питомцев</title>
    <style>
        body { background-color: #2c3e50; color: white; font-family: sans-serif; text-align: center; }
        .slot { width: 100px; height: 100px; background: #e74c3c; display: inline-flex; align-items: center; justify-content: center; font-size: 50px; margin: 5px; border-radius: 15px; }
        .pet-container { background: #34495e; padding: 15px; border-radius: 10px; margin: 20px auto; width: 80%; }
        .spin-btn { padding: 15px 25px; cursor: pointer; border: none; border-radius: 10px; color: white; font-weight: bold; margin: 5px; }
        @keyframes spinAnim { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animating { animation: spinAnim 0.5s linear; }
    </style>
</head>
<body>

<h3>💎 Кристаллы: <span id="crystal-count">10</span> | 💰 Баланс: <span id="balance">100000</span></h3>

<div id="slots-wrapper">
    <div class="slot" id="s1">🎰</div><div class="slot" id="s2">🎰</div><div class="slot" id="s3">🎰</div>
</div>

<div class="controls">
    <button class="spin-btn" style="background:#f39c12" onclick="spin(1)">Крутить за 1</button>
    <button class="spin-btn" style="background:#27ae60" onclick="spin(25)">Крутить за 25</button>
    <button class="spin-btn" style="background:#2980b9" onclick="spin(50000)">Крутить за 50к</button>
</div>

<div class="pet-container">
    <h3>Яйцо 🥚</h3>
    <button id="eggBtn" onclick="openEgg()" style="padding: 10px; cursor: pointer;">Открыть за 50к монет</button>
    <div style="margin-top:10px;">Ваши питомцы: <div id="pet-list">Нет</div></div>
    <div id="timer-display" style="margin-top:10px; color: #f1c40f;">Следующая награда через: 10:00</div>
    
    <div id="wolf-task" style="display:none; margin-top: 15px; border: 2px solid gold; padding: 10px;">
        <strong>Задание Волка 🐺:</strong> Набери 10 миллионов монет! 
        <button onclick="checkWolfTask()">ПРОВЕРИТЬ</button>
    </div>
</div>

<script>
    let money = parseInt(localStorage.getItem('myCasinoMoney')) || 100000;
    let crystals = parseInt(localStorage.getItem('myCasinoCrystals')) || 10;
    let pets = JSON.parse(localStorage.getItem('myPets')) || [];
    let timeLeft = 600;

    function updateUI() {
        document.getElementById('balance').innerText = money;
        document.getElementById('crystal-count').innerText = crystals;
        document.getElementById('pet-list').innerText = pets.join(', ');
        document.getElementById('wolf-task').style.display = pets.includes("Волк 🐺") ? 'block' : 'none';
        localStorage.setItem('myCasinoMoney', money);
        localStorage.setItem('myCasinoCrystals', crystals);
        localStorage.setItem('myPets', JSON.stringify(pets));
    }

    function spin(cost) {
        if (money < cost) return alert("Мало монет!");
        money -= cost;
        let slots = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3')];
        slots.forEach(s => s.classList.add('animating'));
        
        setTimeout(() => {
            let rand = Math.random() * 100;
            if (rand < 0.1) {
                slots[0].innerText = "💎"; slots[1].innerText = "💎"; slots[2].innerText = "💎";
                money += 10000000; crystals += 10;
                alert("ДЖЕКПОТ! 3 КРИСТАЛЛА! +10 кристаллов и 10М монет!");
            } else if (rand < 1.1) {
                slots[0].innerText = "🍋"; slots[1].innerText = "🍋"; slots[2].innerText = "🍋";
                money += 100000;
                alert("УДАЧА! 3 ЛИМОНА! +100К монет!");
            } else if (rand < 26.1) {
                slots[0].innerText = "🍒"; slots[1].innerText = "🍒"; slots[2].innerText = "🍒";
                money += 500;
                alert("ЧЕРЕШНЯ! +500 монет!");
            } else {
                slots[0].innerText = "💰"; slots[1].innerText = "⭐"; slots[2].innerText = "🔔";
            }
            slots.forEach(s => s.classList.remove('animating'));
            updateUI();
        }, 500);
    }

    function openEgg() {
        if (money < 50000) return alert("Мало монет!");
        let btn = document.getElementById('eggBtn');
        btn.classList.add('animating');
        setTimeout(() => {
            btn.classList.remove('animating');
            money -= 50000;
            let rand = Math.random() * 100;
            let result = (rand < 60) ? "Кошка 🐱" : (rand < 90) ? "Собака 🐕‍🦺" : "Волк 🐺";
            pets.push(result);
            alert("✨ Из яйца вылупился: " + result + " ✨");
            updateUI();
        }, 500);
    }

    function checkWolfTask() {
        if (money >= 10000000) { crystals += 30; alert("Волк доволен! +30 кристаллов"); }
        else { alert("Еще недостаточно монет для Волка!"); }
    }

    setInterval(() => {
        if (timeLeft <= 0) {
            pets.forEach(p => {
                if (p === "Кошка 🐱") crystals += 1;
                if (p === "Собака 🐕‍🦺") money += 30000;
            });
            timeLeft = 600;
        } else { timeLeft--; }
        document.getElementById('timer-display').innerText = 
            "Следующая награда через: " + Math.floor(timeLeft/60) + ":" + (timeLeft%60).toString().padStart(2, '0');
        updateUI();
    }, 1000);

    updateUI();
</script>
</body>
</html>
