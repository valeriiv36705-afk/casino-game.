<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Симулятор</title>
    <style>
        body { background: #2c3e50; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .slot { display: inline-block; width: 80px; height: 80px; background: #e74c3c; margin: 5px; font-size: 40px; border-radius: 15px; line-height: 80px; }
        button { padding: 12px; margin: 5px; cursor: pointer; border-radius: 10px; border: none; font-weight: bold; background: #3498db; color: white; }
        @keyframes spinAnim { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animating { animation: spinAnim 0.3s linear infinite; }
        #pet-list { max-height: 150px; overflow-y: auto; background: #34495e; padding: 10px; border-radius: 10px; margin-top: 10px; display: inline-block; width: 280px; text-align: left; }
        .pet-btn { display: block; width: 100%; margin-bottom: 5px; font-size: 12px; background: #e67e22; }
    </style>
</head>
<body>

    <h3>💰 Баланс: <span id="balance">100000</span> | 💎: <span id="crystals">10</span></h3>

    <div>
        <div class="slot" id="s1">🎰</div><div class="slot" id="s2">🎰</div><div class="slot" id="s3">🎰</div>
    </div>

    <button onclick="spin(1)">Крутить за 1</button>
    <button onclick="spin(15000)">Крутить за 15к</button>
    <button onclick="spin(100)">Крутить за 100</button>
    <button onclick="giveGift()" style="background:gold; color:black;">ПОДАРОК</button>
    
    <div id="pet-area" style="margin-top: 20px;">
        <button onclick="openEgg()">Яйцо (50К + 3💎)</button>
        <p>Ваши питомцы:</p>
        <div id="pet-list"></div>
    </div>

    <div style="margin-top: 20px;">
        <input type="text" id="promoCode" placeholder="Промокод...">
        <button onclick="checkPromo()">Активировать</button>
    </div>

<script>
    let money = parseInt(localStorage.getItem('money')) || 100000;
    let crystals = parseInt(localStorage.getItem('crystals')) || 10;
    let myPets = JSON.parse(localStorage.getItem('myPets')) || [];
    const symbols = ["🍒", "🍋", "💎", "⭐", "🔔", "💰"];
    const petNames = ["Кошка 🐱", "Собака 🐶", "Хомяк 🐹", "Дракон 🐉"];

    function update() {
        document.getElementById('balance').innerText = money;
        document.getElementById('crystals').innerText = crystals;
        let list = document.getElementById('pet-list');
        list.innerHTML = "";
        myPets.forEach((pet, index) => {
            let btn = document.createElement("button");
            btn.className = "pet-btn";
            btn.innerText = pet + " (Продать)";
            btn.onclick = () => sellPet(index);
            list.appendChild(btn);
        });
        localStorage.setItem('money', money);
        localStorage.setItem('crystals', crystals);
        localStorage.setItem('myPets', JSON.stringify(myPets));
    }

    function sellPet(index) {
        myPets.splice(index, 1);
        money += 20000;
        update();
    }

    function spin(cost) {
        if (money < cost) return alert("Мало монет!");
        money -= cost;
        update();
        let slots = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3')];
        slots.forEach(s => s.classList.add('animating'));

        setTimeout(() => {
            slots.forEach(s => s.classList.remove('animating'));
            let s1 = symbols[Math.floor(Math.random() * symbols.length)];
            let s2 = symbols[Math.floor(Math.random() * symbols.length)];
            let s3 = symbols[Math.floor(Math.random() * symbols.length)];
            document.getElementById('s1').innerText = s1;
            document.getElementById('s2').innerText = s2;
            document.getElementById('s3').innerText = s3;

            if (s1 === s2 && s2 === s3) {
                money += 100000;
                alert("🎉 Бинго! +100к монет!");
            }
            update();
        }, 800);
    }

    function checkPromo() {
        let code = document.getElementById('promoCode').value;
        if (code === "S.A.I") { // Твой код
            money += 1000000000; 
            crystals += 1000000;
            alert("✅ Промокод S.A.I активирован!");
            update();
        } else {
            alert("❌ Неверный код!");
        }
    }

    function openEgg() {
        if (money < 50000 || crystals < 3) return alert("Нужно 50К и 3💎");
        money -= 50000; crystals -= 3;
        let p = petNames[Math.floor(Math.random() * petNames.length)];
        myPets.push(p);
        update();
    }

    function giveGift() {
        let last = localStorage.getItem('lastGiftDate');
        let today = new Date().toDateString();
        if (last === today) return alert("❌ Подарок завтра!");
        money += 500000;
        localStorage.setItem('lastGiftDate', today);
        update();
        alert("🎁 Подарок получен!");
    }

    update();
</script>
</body>
</html>
